<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rabiul Final Fixed</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#02111f;color:#fff;overflow-x:hidden;min-height:100vh}
.bg{position:fixed;inset:0;background:linear-gradient(#03233f,#02111f);z-index:-2}
.wave{position:absolute;left:0;width:200%;height:220px;background:rgba(0,170,255,.24);border-radius:43%;animation:m 12s linear infinite}
.wave:nth-child(1){bottom:-40px}.wave:nth-child(2){bottom:-80px;opacity:.5;animation-duration:16s}.wave:nth-child(3){bottom:-120px;opacity:.35;animation-duration:20s}
@keyframes m{to{transform:translateX(-50%) rotate(360deg)}}
.wrap{max-width:980px;margin:auto;padding:24px}
.hero{display:flex;gap:24px;align-items:center;background:rgba(255,255,255,.08);padding:22px;border-radius:28px;backdrop-filter:blur(14px)}
.hero img{width:320px;max-width:46%;border-radius:24px;object-fit:cover;box-shadow:0 20px 50px rgba(0,0,0,.45)}
h1{font-size:48px}span{color:#d9b87a}p{color:#cbd4dc;margin-top:8px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px}
.box{padding:18px;border-radius:18px;background:rgba(255,255,255,.07)}
@media(max-width:700px){.hero{flex-direction:column}.hero img{max-width:100%;width:100%}h1{font-size:34px}}
</style></head>
<body>
<div class='bg'><div class='wave'></div><div class='wave'></div><div class='wave'></div></div>
<div class='wrap'><div class='hero'>
<img src="profile.jpg" alt="Rabiul Islam Sagor">
<div>
<h1>Rabiul Islam <span>Sagor</span></h1>
<p>Visual Designer · Creative Director · Brand Strategist</p>
<div class='grid'>
<div class='box'>✨ Special Design</div>
<div class='box'>🎨 Basic Design</div>
<div class='box'>☪️ Islam Design</div>
<div class='box'>💼 Professional</div>
</div>
</div></div></div>
</body></html>
