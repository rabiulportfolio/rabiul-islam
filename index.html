<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rabiul Real Water Profile</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#02111f;color:#fff;min-height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center}
.water{position:fixed;inset:0;background:linear-gradient(#03233f,#02111f);z-index:-2}
.wave{position:absolute;left:0;width:200%;height:220px;background:rgba(0,170,255,.28);border-radius:43%;animation:move 10s linear infinite}
.wave:nth-child(1){bottom:-40px}.wave:nth-child(2){bottom:-70px;opacity:.5;animation-duration:14s}.wave:nth-child(3){bottom:-100px;opacity:.35;animation-duration:18s}
@keyframes move{0%{transform:translateX(0) rotate(0)}100%{transform:translateX(-50%) rotate(360deg)}}
.wrap{width:92%;max-width:560px;background:rgba(255,255,255,.08);backdrop-filter:blur(16px);padding:28px;border-radius:28px;border:1px solid rgba(255,255,255,.15);text-align:center}
img{width:170px;height:170px;border-radius:50%;object-fit:cover;border:4px solid rgba(255,255,255,.3);box-shadow:0 15px 35px rgba(0,0,0,.4)}
h1{margin-top:18px;font-size:38px}
span{color:#d9b87a}
p{color:#cbd4dc;margin-top:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px}
.box{padding:18px;border-radius:18px;background:rgba(255,255,255,.07)}
.footer{margin-top:20px;font-size:12px;color:#aab4bd}
</style>
</head>
<body>
<div class="water"><div class="wave"></div><div class="wave"></div><div class="wave"></div></div>
<div class="wrap">
<img src="<img src="profile rabiul islam" alt="Profile Photo">
<h1>Rabiul Islam <span>Sagor</span></h1>
<p>Visual Designer · Creative Director · Brand Strategist</p>
<div class="grid">
<div class="box">✨ Special Design</div>
<div class="box">🎨 Basic Design</div>
<div class="box">☪️ Islam Design</div>
<div class="box">💼 Professional</div>
</div>
<div class="footer">© 2026 All rights reserved</div>
</div>
</body>
</html>
