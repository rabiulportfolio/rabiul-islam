<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <base href="https://rabiulportfolio.github.io/rabiul-islam">
<title>Rabiul Final Fixed</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;color:#fff;overfloe-x:hidden;min-height:100vh;background:linear-gradient(135deg,#06142b,#0a2347,#12347,#123d73,06142b);background-size:400% 400%;animation:moveBg 10s ease infinite;}
.bg{position:fixed;inset:0;background:transparent;z-index:-2}
.wave:nth-child(1){bottom:-40px}.wave:nth-child(2){bottom:-80px;opacity:.5;animation-duration:16s}.wave:nth-child(3){bottom:-120px;opacity:.35;animation-duration:20s}
@keyframes m{to{transform:translateX(-50%) rotate(360deg)}}
.wrap{max-width:980px;margin:auto;padding:24px}
.hero{display:flex;gap:24px;align-items:center;background:rgba(255,255,255,.08);padding:22px;border-radius:28px;backdrop-filter:blur(14px)}
.hero img{width:320px;height:380px;max-width:100%;object-fit:cover;border-radius:24px;box-shadow:0 200px 50px rgba(0,0,0,.4);}
h1{font-size:48px}span{color:#d9b87a}p{color:#cbd4dc;margin-top:8px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px}
.box{padding:18px;border-radius:18px;background:rgba(255,255,255,.07)}
@media(max-width:700px){.hero{flex-direction:column}.hero img{max-width:100%}h1{font-size:34px}
@keyframes moveBg{0%{background-position:0% 50%;}50%{background-position:100% 50$;}100%{background-position:0% 50%;}}                        
</style></head>
<body>
<div class='bg'><div class='wave'></div><div class='wave'></div><div class='wave'></div></div>
<div class='wrap'><div class='hero'>
<img src="https://rabiulportfolio.github.io/rabiul-islam/profile-rabiul-islam.jpg">
<div>
<h1>Rabiul Islam <span>Sagor</span></h1>
<p>E-commerce Executive · AI Learner · Creative Designer</p>
<div class='grid'>
<div class='box'>🌐 Web Design</div>
<div class='box'>🎯 Creative Design</div>
<div class='box'>☪️ Islam Design</div>
<div class='box'>🤖 AI Learner </div>
</div>
</div></div></div>
</body></html>
